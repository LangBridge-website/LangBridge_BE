services:
  backend_blue:
    container_name: langbridge-backend-blue
    build:
      context: .
    env_file:
      - .env
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 180s
    networks:
      langbridge:
        ipv4_address: 10.10.120.11
    volumes:
      - playwright_cache:/root/.cache/ms-playwright
    restart: unless-stopped

  backend_green:
    container_name: langbridge-backend-green
    build:
      context: .
    env_file:
      - .env
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 180s
    networks:
      langbridge:
        ipv4_address: 10.10.120.12
    volumes:
      - playwright_cache:/root/.cache/ms-playwright
    restart: unless-stopped

volumes:
  playwright_cache:

networks:
  langbridge:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.120.0/24
          gateway: 10.10.120.1
