spring:
  application:
    name: TransFlow

  # .env 파일 로드 (Spring Boot 2.4+)
  config:
    import: optional:file:.env[.properties]

  # 데이터베이스 설정
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
    open-in-view: false

  # 요청 크기 제한 설정 (대용량 HTML 임시저장 지원)
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # OAuth2 클라이언트 설정
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - email
              - profile
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# 앱 공통 (OAuth 리다이렉트·CORS)
# 배포 시: FRONTEND_URL, CORS_ALLOWED_ORIGINS 환경변수로 덮어쓰기
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,https://lb.walab.info}


# JWT 설정
# 서버 .env 에는 JWT_SECRET_KEY 를 쓰는 경우가 많아 둘 다 지원 (JWT_SECRET_KEY 우선)
jwt:
  secret: ${JWT_SECRET_KEY:${JWT_SECRET:transflow-secret-key-for-jwt-token-generation-minimum-256-bits}}
  expiration: 86400000 # 24시간 (밀리초)

# 서버 설정
server:
  port: 8080
  forward-headers-strategy: native
  servlet:
    context-path: /
  # 타임아웃 설정 (번역 시간 고려)
  tomcat:
    connection-timeout: 300000
    max-http-form-post-size: -1 # 폼 데이터 크기 제한 해제
    max-swallow-size: -1        # 요청 바디 수용 크기 제한 해제

# Swagger 설정
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# 로깅 설정
logging:
  level:
    com.project.Transflow: DEBUG
    org.springframework.security: DEBUG

# 암호화 설정
encryption:
  secret:
    key: ${ENCRYPTION_SECRET_KEY}

# DeepL API 설정
deepl:
  api:

    url: ${DEEPL_API_URL:https://api-free.deepl.com/v2/translate}
    # key: ${DEEPL_API_KEY:}  # 더 이상 사용하지 않음 (DB에서 관리)

# creation.kr 자동 게시 설정
creation-kr:
  enabled: ${CREATION_KR_ENABLED:true}
  base-url: https://creation.kr
  timeout-ms: 90000
  headless: true
  seed-categories: ${CREATION_KR_SEED_CATEGORIES:true}
  selectors:
    email-input: "input[name='uid'], input[title='이메일']"
    password-input: "input[name='passwd'], input[title='비밀번호']"
    login-submit: "button.btn-primary.btn-block, button.btn.btn-primary:has-text('로그인'), text=로그인"
    write-title: "#post_subject, input[name='subject']"
    write-body: "#post_body .fr-element.fr-view, #post_body .fr-element, #post_body [contenteditable='true']"
    write-submit: "button._save_post, button.save_post, text=작성"
